<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AQUANAUTIX — Recuperar password</title>
  <style>
    :root {
      --bg: #000814;
      --cyan: #00F5FF;
      --hint: #8AADBE;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--hint);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    main {
      width: min(420px, 100%);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      color: var(--cyan);
    }
    p { margin: 0 0 20px; line-height: 1.55; font-size: 0.95rem; }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--cyan);
      color: #000814;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .err { color: #ff8a80; }
  </style>
</head>
<body>
  <main>
    <h1>AQUANAUTIX</h1>
    <p id="msg">A abrir a app para definires a nova password…</p>
    <button id="openApp" type="button" hidden>ABRIR AQUANAUTIX</button>
  </main>
  <script>
    (function () {
      var suffix = window.location.search + window.location.hash;
      var deepLink = 'aquanautix://reset-password' + suffix;
      var msg = document.getElementById('msg');
      var btn = document.getElementById('openApp');

      if (!suffix) {
        msg.textContent = 'Link inválido ou expirado. Pede um novo link em Recuperar password na app.';
        msg.className = 'err';
        return;
      }

      function openApp() {
        window.location.href = deepLink;
      }

      btn.hidden = false;
      btn.addEventListener('click', openApp);
      openApp();

      setTimeout(function () {
        msg.textContent = 'Se a app não abriu, toca no botão abaixo. Depois define a nova password no ecrã da app (não recebes password por email — só este link).';
      }, 1800);
    })();
  </script>
</body>
</html>
