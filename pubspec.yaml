name: aquanautix
description: AQUANAUTIX — instrumento de pesca de elite · Midnight Deep Sea
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  supabase_flutter: ^2.12.4
  package_info_plus: ^8.1.2
  purchases_flutter: ^9.15.0
  mapbox_maps_flutter: ^2.23.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  flutter_animate: ^4.5.2
  video_player: ^2.9.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/species_ibero.json
    - assets/robalo_scanner.png
    - assets/onboarding/
    - assets/video_bg.mp4
